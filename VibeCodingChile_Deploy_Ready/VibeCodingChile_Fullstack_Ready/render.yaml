services:
  - type: web
    name: chilesoccerdb-api
    env: python
    # Nos movemos a la carpeta donde está el requirements.txt
    buildCommand: cd VibeCodingChile_Deploy_Ready/VibeCodingChile_Fullstack_Ready/backend && pip install -r requirements.txt
    # Ejecutamos uvicorn apuntando al archivo main dentro de backend
    startCommand: cd VibeCodingChile_Deploy_Ready/VibeCodingChile_Fullstack_Ready/backend && uvicorn main:app --host 0.0.0.0 --port $PORT
